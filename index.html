<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Road Trip">
<meta name="theme-color" content="#0b0f14">
<title>Road Trip Dashboard</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="vendor/uplot/uPlot.min.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<header id="topbar">
  <div id="gpsStatus" title="GPS status"><span id="gpsDot" class="dot dot-off"></span><span id="gpsAcc">no fix</span></div>
  <div id="tripState">no trip</div>
  <button id="settingsBtn" aria-label="Settings">&#9881;</button>
</header>

<main>

  <!-- ── Drive ─────────────────────────────────────────── -->
  <section id="screen-drive" class="screen active">
    <div class="speed-block">
      <div id="speedVal" class="speed-num">--</div>
      <div id="speedUnit" class="speed-unit">mph</div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">distance</div><div id="distVal" class="stat-num">--</div></div>
      <div class="stat-card"><div class="stat-label">elevation</div><div id="elevVal" class="stat-num">--</div></div>
      <div class="stat-card"><div class="stat-label">heading</div><div id="headingVal" class="stat-num">--</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">trip time</div><div id="tripTime" class="stat-num sm">--</div></div>
      <div class="stat-card"><div class="stat-label">moving</div><div id="movingTime" class="stat-num sm">--</div></div>
      <div class="stat-card"><div class="stat-label">weather</div><div id="wxGlance" class="stat-num sm">--</div></div>
    </div>
    <div id="eventFeed"></div>
    <button id="tripBtn" class="primary-btn">Start Trip</button>
  </section>

  <!-- ── Charts ────────────────────────────────────────── -->
  <section id="screen-charts" class="screen">
    <h2>Speed <span class="unit-hint" data-unit="speed"></span></h2>
    <div id="chartSpeed" class="chart-box"></div>
    <h2>Elevation <span class="unit-hint" data-unit="alt"></span></h2>
    <div id="chartElev" class="chart-box"></div>
    <div class="chart-note" id="chartNote"></div>
  </section>

  <!-- ── Map ───────────────────────────────────────────── -->
  <section id="screen-map" class="screen">
    <div id="map"></div>
    <div id="mapControls">
      <button id="radarToggle" class="chip">radar</button>
      <button id="followToggle" class="chip chip-on">follow</button>
    </div>
    <div id="wxPanel" class="panel">
      <div id="wxNow">--</div>
      <div id="wxNext"></div>
    </div>
  </section>

  <!-- ── Sky ───────────────────────────────────────────── -->
  <section id="screen-sky" class="screen">
    <div id="sunCard" class="panel">
      <div id="sunTimes">--</div>
      <div id="sunPos"></div>
      <div id="terminatorInfo" class="fun-fact"></div>
      <div id="moonInfo"></div>
    </div>
    <div id="issCard" class="panel">
      <div id="issInfo">🛰️ locating ISS…</div>
    </div>
    <h2>Aircraft nearby <span id="planeCount"></span></h2>
    <div id="planeList"><div class="muted">waiting for position…</div></div>
  </section>

  <!-- ── Trips ─────────────────────────────────────────── -->
  <section id="screen-trips" class="screen">
    <h2>Current trip</h2>
    <div id="liveStats" class="stats-grid"></div>
    <div class="trip-actions">
      <button id="exportGpxBtn" class="chip">export GPX</button>
      <button id="exportCsvBtn" class="chip">export CSV</button>
    </div>
    <h2>Achievements</h2>
    <div id="badgeTray" class="badge-tray"></div>
    <h2>Past trips</h2>
    <div id="tripHistory"><div class="muted">no saved trips</div></div>
  </section>

</main>

<nav id="tabbar">
  <button data-screen="drive" class="active"><span class="tab-icon">&#128663;</span>Drive</button>
  <button data-screen="charts"><span class="tab-icon">&#128200;</span>Charts</button>
  <button data-screen="map"><span class="tab-icon">&#128506;</span>Map</button>
  <button data-screen="sky"><span class="tab-icon">&#9992;</span>Sky</button>
  <button data-screen="trips"><span class="tab-icon">&#128203;</span>Trips</button>
</nav>

<div id="toasts"></div>

<dialog id="settings">
  <h2>Settings</h2>
  <label>Units
    <select id="setUnits">
      <option value="imperial">imperial (mph, ft, mi)</option>
      <option value="metric">metric (km/h, m, km)</option>
    </select>
  </label>
  <label>Aircraft search radius
    <select id="setPlaneRadius">
      <option value="15">15 nm</option>
      <option value="25" selected>25 nm</option>
      <option value="50">50 nm</option>
    </select>
  </label>
  <label class="check"><input type="checkbox" id="setWake" checked> Keep screen awake</label>
  <div class="settings-footer">
    <span id="verInfo"></span>
    <button id="settingsClose" class="primary-btn">Done</button>
  </div>
</dialog>

<script src="vendor/uplot/uPlot.iife.min.js"></script>
<script src="vendor/leaflet/leaflet.js"></script>
<script src="vendor/suncalc/suncalc.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
